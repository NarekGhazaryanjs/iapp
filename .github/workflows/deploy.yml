name: Deploy iapp to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f index.html
          test -f index.css
          test -f menu.js
          test -f menu.css

      - name: Prepare emergency root deploy bundle
        run: |
          rm -rf deploy-root
          mkdir -p deploy-root
          cp index.html deploy-root/index.html
          cp index.css deploy-root/index.css
          cp menu.js deploy-root/menu.js
          cp menu.css deploy-root/menu.css

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./deploy-root/
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.vscode/**
            **/node_modules/**
            **/.DS_Store
            iapp-deploy.zip
            shablon.txt
